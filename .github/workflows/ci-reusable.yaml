name: Agoge Academy API Reusable CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version used by CI jobs.
        required: false
        type: string
        default: '22'
      run-docker-build:
        description: Build the Docker image when a production Dockerfile is available.
        required: false
        type: boolean
        default: false
    secrets:
      DATABASE_URL:
        required: false
      JWT_SECRET:
        required: false
      JWT_REFRESH_SECRET:
        required: false

permissions:
  contents: read

env:
  CI: true
  NODE_ENV: test
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/agoge_ci?schema=public' }}
  JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-jwt-secret' }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'ci-jwt-refresh-secret' }}
  FRONTEND_URL: http://localhost:3000

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js and dependencies
        uses: ./.github/actions/node-setup-action
        with:
          node-version: ${{ inputs.node-version }}

      - name: Generate Prisma client
        if: ${{ hashFiles('prisma/schema.prisma') != '' }}
        run: yarn prisma:generate

      - name: Run ESLint
        run: yarn lint

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js and dependencies
        uses: ./.github/actions/node-setup-action
        with:
          node-version: ${{ inputs.node-version }}

      - name: Generate Prisma client
        if: ${{ hashFiles('prisma/schema.prisma') != '' }}
        run: yarn prisma:generate

      - name: Build application
        run: yarn build

      - name: Smoke test production start
        run: |
          yarn start:prod &
          SERVER_PID=$!
          sleep 5

          if kill -0 "$SERVER_PID" 2>/dev/null; then
            echo "Agoge Academy API production server started successfully."
            kill "$SERVER_PID"
          else
            echo "Agoge Academy API production server failed to start."
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - lint
      - build
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agoge_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d agoge_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js and dependencies
        uses: ./.github/actions/node-setup-action
        with:
          node-version: ${{ inputs.node-version }}

      - name: Generate Prisma client
        if: ${{ hashFiles('prisma/schema.prisma') != '' }}
        run: yarn prisma:generate

      - name: Run database migrations
        if: ${{ hashFiles('prisma/schema.prisma') != '' }}
        run: yarn prisma:migrate:deploy

      - name: Run unit tests with coverage
        run: yarn test:cov

      - name: Run E2E tests
        run: yarn test:e2e

      - name: Upload test coverage
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: agoge-api-coverage
          path: coverage
          if-no-files-found: ignore
          retention-days: 14

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build
    if: ${{ inputs.run-docker-build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Dockerfile
        shell: bash
        run: |
          if [ ! -s Dockerfile ]; then
            echo "Docker build was requested, but Dockerfile is missing or empty."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: agoge-academy-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
