name: Agoge Academy API Production Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to publish and deploy.
        required: false
        default: latest

permissions:
  contents: read

concurrency:
  group: agoge-api-production-deploy
  cancel-in-progress: false

jobs:
  preflight:
    name: Validate production deployment prerequisites
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.image-tag.outputs.value }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Dockerfile
        shell: bash
        run: |
          if [ ! -s Dockerfile ]; then
            echo "Dockerfile is missing or empty. Production deploy cannot build an image yet."
            exit 1
          fi

      - name: Validate Docker Hub credentials
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required for production deploy."
            exit 1
          fi

      - name: Resolve image tag
        id: image-tag
        shell: bash
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="latest"
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

  ci:
    name: Run reusable CI
    needs: preflight
    uses: ./.github/workflows/ci-reusable.yaml
    with:
      node-version: '22'
      run-docker-build: true
    secrets:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}

  docker-push:
    name: Build and push production image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - preflight
      - ci
    environment: production
    outputs:
      image-tags: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/agoge-academy-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=${{ needs.preflight.outputs.image-tag }}
            type=ref,event=tag
          labels: |
            org.opencontainers.image.title=Agoge Academy API
            org.opencontainers.image.description=Production image for Agoge Academy API

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deployment-summary:
    name: Production deployment summary
    runs-on: ubuntu-latest
    needs: docker-push
    environment: production
    steps:
      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## Agoge Academy API production image published"
            echo ""
            echo "**Image tags:**"
            echo '```'
            echo "${{ needs.docker-push.outputs.image-tags }}"
            echo '```'
            echo "**Digest:** \`${{ needs.docker-push.outputs.image-digest }}\`"
            echo ""
            echo "Add server-specific deployment steps here when the production target is available."
          } >> "$GITHUB_STEP_SUMMARY"
