name: Agoge Academy API Scheduled Maintenance

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: agoge-api-scheduled-maintenance
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js and dependencies
        uses: ./.github/actions/node-setup-action
        with:
          node-version: '22'

      - name: Run Yarn audit
        id: audit
        continue-on-error: true
        run: yarn audit --level moderate

      - name: Create or update vulnerability issue
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Automated] Agoge Academy API dependency audit requires review';
            const labels = ['security', 'automated', 'dependencies'];
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: labels.join(','),
              state: 'open',
              per_page: 20,
            });

            const existing = issues.find((issue) => issue.title === title);
            const body = [
              'The scheduled Agoge Academy API dependency audit found vulnerabilities at moderate severity or higher.',
              '',
              'Please run:',
              '',
              '```bash',
              'yarn audit --level moderate',
              '```',
              '',
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
            }

  docker-scan:
    name: Docker image security scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Dockerfile
        id: dockerfile
        shell: bash
        run: |
          if [ -s Dockerfile ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "Dockerfile is missing or empty. Skipping Docker image scan."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.dockerfile.outputs.available == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scanning
        if: steps.dockerfile.outputs.available == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: agoge-academy-api:scan

      - name: Run Trivy vulnerability scanner
        if: steps.dockerfile.outputs.available == 'true'
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: agoge-academy-api:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  stale-branches:
    name: Stale branch report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Find stale branches
        uses: actions/github-script@v7
        with:
          script: |
            const protectedBranches = new Set(['main', 'develop']);
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - 30);

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const staleBranches = [];

            for (const branch of branches) {
              if (protectedBranches.has(branch.name)) continue;

              const { data: commit } = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: branch.commit.sha,
              });

              const commitDate = new Date(commit.commit.committer.date);
              if (commitDate < cutoff) {
                const daysAgo = Math.floor((Date.now() - commitDate.getTime()) / (1000 * 60 * 60 * 24));
                staleBranches.push(`- \`${branch.name}\` last updated ${daysAgo} days ago`);
              }
            }

            if (staleBranches.length === 0) {
              core.info('No stale branches found.');
              return;
            }

            core.warning(`Found ${staleBranches.length} stale branches:\n${staleBranches.join('\n')}`);
            await core.summary
              .addHeading('Agoge Academy API stale branch report')
              .addRaw(staleBranches.join('\n'))
              .write();
