services:
  db:
    image: postgres:17
    restart: always
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agogedb}
      POSTGRES_USER: ${POSTGRES_USER:-mragoge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecure}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: ['yarn', 'prisma:migrate:deploy']
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mragoge}:${POSTGRES_PASSWORD:-supersecure}@db:5432/${POSTGRES_DB:-agogedb}?schema=public
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${API_PORT:-3000}:3000'
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-mragoge}:${POSTGRES_PASSWORD:-supersecure}@db:5432/${POSTGRES_DB:-agogedb}?schema=public
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
